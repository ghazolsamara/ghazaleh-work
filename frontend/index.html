<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gender Management - Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <h2>🏳️ Gender Management System</h2>
    </div>
    <div class="nav-right">
      <span id="userInfo" class="user-info"></span>
      <button onclick="logout()" class="btn-logout">🚪 Logout</button>
    </div>
  </div>

<div class="main-card">           <!-- NOT "container" -->
  <div class="main-title">        <!-- NOT just "header" -->
    <h1>🏳️ Gender Management</h1>
  </div>

  <div class="form-grid" id="formSection">         <!-- NOT "form-row" -->

    <div class="input-field">
      <label>⚧ Gender</label>
      <select id="gender">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>
    <div class="input-field">
      <label>📝 Description</label>
      <input type="text" id="description" placeholder="Enter description">
    </div>
  </div>

  <div class="actions-bar">       <!-- NOT "buttons" -->
    <button class="btn btn-add">➕ Add</button>
    <button class="btn btn-edit">✏️ Edit</button>
    <button class="btn btn-save">💾 Save</button>
    <button class="btn btn-delete">🗑️ Delete</button>
    <button class="btn btn-cancel">❌ Cancel</button>
  </div>

  <div class="table-header">
    <h3>📋 Gender List</h3>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr><th>Gender</th><th>Description</th></tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>
</div>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
